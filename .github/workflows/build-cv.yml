name: Build CV

on:
  push:
    branches: [master, main]
    paths:
      - 'cv/**.tex'
      - '.github/workflows/build-cv.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
   
      - name: Compile Public Resumes
        uses: xu-cheng/latex-action@v3
        with:
          root_file: |
            resume_en.tex
            resume_tr.tex
            resume_stats_en.tex
            resume_stats_tr.tex
          working_directory: cv
          latexmk_use_xelatex: true

      - name: Upload Public PDFs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdfs-public
          path: cv/*.pdf

      - name: Commit Public PDFs back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cv/*.pdf
          if git diff --staged --quiet; then
            echo "No PDF changes to commit."
          else
            git commit -m "ci: rebuild public CV PDFs [skip ci]"
            git push
          fi
 
      - name: Inject Phone Number
        # Sadece PHONE_NUMBER secret'ı doluysa bu adım çalışır
        if: ${{ secrets.PHONE_NUMBER != '' }}
        env:
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
        run: |
          echo "Telefon numarası bulundu, özel CV hazırlanıyor..."
          sed -i 's|yigitefeavci@outlook.com.tr} \\textbullet\\|yigitefeavci@outlook.com.tr} \\textbullet\\ \\href{tel:'"$PHONE_NUMBER"'}{'"$PHONE_NUMBER"'} \\textbullet\\|g' cv/*.tex

      - name: Compile Private Resumes
        if: ${{ secrets.PHONE_NUMBER != '' }}
        uses: xu-cheng/latex-action@v3
        with:
          root_file: |
            resume_en.tex
            resume_tr.tex
            resume_stats_en.tex
            resume_stats_tr.tex
          working_directory: cv
          latexmk_use_xelatex: true

      - name: Send Private PDFs via Telegram Bot
        if: ${{ secrets.PHONE_NUMBER != '' }}
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚀 Yeni CV'lerin derlendi!
            (Telefon numarası eklendi, GitHub reposuna kaydedilmedi)
          document: cv/*.pdf